<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <rect width="400" height="280" rx="12" fill="#FFF5F5"/>

  <!-- Tree trunk -->
  <rect x="190" y="160" width="20" height="60" rx="4" fill="#D4A574" opacity="0.6"/>

  <!-- Canopy -->
  <ellipse cx="200" cy="130" rx="120" ry="80" fill="#86EFAC" opacity="0.2"/>
  <ellipse cx="200" cy="130" rx="90" ry="60" fill="#86EFAC" opacity="0.15"/>

  <!-- Grandparents row -->
  <rect x="30" y="50" width="70" height="28" rx="14" fill="#FECDD3"/>
  <text x="65" y="68" text-anchor="middle" font-size="9" fill="#9F1239" font-family="system-ui">Grandma</text>
  <rect x="110" y="50" width="70" height="28" rx="14" fill="#FECDD3"/>
  <text x="145" y="68" text-anchor="middle" font-size="9" fill="#9F1239" font-family="system-ui">Grandpa</text>
  <rect x="220" y="50" width="70" height="28" rx="14" fill="#FECDD3"/>
  <text x="255" y="68" text-anchor="middle" font-size="9" fill="#9F1239" font-family="system-ui">Grandma</text>
  <rect x="300" y="50" width="70" height="28" rx="14" fill="#FECDD3"/>
  <text x="335" y="68" text-anchor="middle" font-size="9" fill="#9F1239" font-family="system-ui">Grandpa</text>

  <!-- Lines from grandparents to parents -->
  <line x1="100" y1="78" x2="130" y2="110" stroke="#FECDD3" stroke-width="1.5"/>
  <line x1="145" y1="78" x2="130" y2="110" stroke="#FECDD3" stroke-width="1.5"/>
  <line x1="255" y1="78" x2="270" y2="110" stroke="#FECDD3" stroke-width="1.5"/>
  <line x1="335" y1="78" x2="270" y2="110" stroke="#FECDD3" stroke-width="1.5"/>

  <!-- Parents row -->
  <rect x="90" y="110" width="80" height="28" rx="14" fill="#FCA5A5"/>
  <text x="130" y="128" text-anchor="middle" font-size="10" fill="#7F1D1D" font-family="system-ui">Mom</text>
  <rect x="230" y="110" width="80" height="28" rx="14" fill="#FCA5A5"/>
  <text x="270" y="128" text-anchor="middle" font-size="10" fill="#7F1D1D" font-family="system-ui">Dad</text>

  <!-- Lines from parents to baby -->
  <line x1="130" y1="138" x2="200" y2="170" stroke="#FCA5A5" stroke-width="1.5"/>
  <line x1="270" y1="138" x2="200" y2="170" stroke="#FCA5A5" stroke-width="1.5"/>

  <!-- Baby -->
  <rect x="155" y="170" width="90" height="32" rx="16" fill="#FB7185"/>
  <text x="200" y="190" text-anchor="middle" font-size="11" fill="white" font-weight="600" font-family="system-ui">Baby</text>

  <!-- Hint text -->
  <text x="200" y="240" text-anchor="middle" font-size="10" fill="#9CA3AF" font-family="system-ui">Replace with your example image</text>
  <text x="200" y="255" text-anchor="middle" font-size="9" fill="#D1D5DB" font-family="system-ui">Upload to /public/family-tree-example.png</text>
</svg>
